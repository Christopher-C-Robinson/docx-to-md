name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  prepare:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve tag and ref
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target.label }}
    needs: prepare
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: mac
            label: macOS
            os: macos-latest
            script: electron:dist:mac
          - id: win
            label: Windows
            os: windows-latest
            script: electron:dist:win
          - id: linux
            label: Linux
            os: ubuntu-latest
            script: electron:dist:linux

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build installer artifacts (macOS)
        if: matrix.target.id == 'mac'
        env:
          # ── macOS code-signing & notarization (optional) ──────────────────
          # Set these repository secrets to enable signing and notarization.
          # If they are not configured, electron-builder silently skips
          # signing and notarization and produces unsigned artifacts instead.
          #
          # CSC_LINK            – base64-encoded .p12 Developer ID certificate
          # CSC_KEY_PASSWORD    – passphrase for the .p12 certificate
          # APPLE_ID            – Apple ID used for notarization
          # APPLE_ID_PASSWORD   – app-specific password for that Apple ID
          # APPLE_TEAM_ID       – 10-character Apple Developer Team ID
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "${CSC_LINK}" ] || unset CSC_LINK
          [ -n "${CSC_KEY_PASSWORD}" ] || unset CSC_KEY_PASSWORD
          [ -n "${APPLE_ID}" ] || unset APPLE_ID
          [ -n "${APPLE_ID_PASSWORD}" ] || unset APPLE_ID_PASSWORD
          [ -n "${APPLE_TEAM_ID}" ] || unset APPLE_TEAM_ID
          npm run ${{ matrix.target.script }}

      - name: Build installer artifacts (Windows)
        if: matrix.target.id == 'win'
        env:
          # ── Windows code-signing (optional) ───────────────────────────────
          # WIN_CSC_LINK         – base64-encoded .p12 certificate for Windows
          # WIN_CSC_KEY_PASSWORD – passphrase for the Windows .p12 certificate
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          [ -n "${WIN_CSC_LINK}" ] || unset WIN_CSC_LINK
          [ -n "${WIN_CSC_KEY_PASSWORD}" ] || unset WIN_CSC_KEY_PASSWORD
          npm run ${{ matrix.target.script }}

      - name: Build installer artifacts (Linux)
        if: matrix.target.id == 'linux'
        run: npm run ${{ matrix.target.script }}

      - name: Upload artifacts (${{ matrix.target.label }})
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target.id }}
          path: |
            release/*-mac-*.dmg
            release/*-mac-*.zip
            release/*-win-*-installer.exe
            release/*-win-*-portable.exe
            release/*-linux-*.AppImage
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release if missing and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --repo "$REPO" --title "docx-to-md $TAG_NAME" --generate-notes
          fi

          mapfile -t files < <(find release-assets -maxdepth 1 -type f \
            \( -name "*-mac-*.dmg" -o -name "*-mac-*.zip" -o -name "*-win-*-installer.exe" -o -name "*-win-*-portable.exe" -o -name "*-linux-*.AppImage" \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found in release-assets"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --repo "$REPO" --clobber
