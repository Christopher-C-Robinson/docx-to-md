name: Auto Release

# Runs on the 1st of every month at midnight UTC, or on demand.
# On demand: go to Actions → Auto Release → Run workflow.
#   bump  – version segment to increment (default: patch)
#   force – create a release even when no new commits exist

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch, minor, or major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      force:
        description: 'Create a release even if no new commits since last release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Decide whether to release and bump the version.
  # ──────────────────────────────────────────────────────────────────────────
  check-and-version:
    name: Check for changes and bump version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      previous_tag: ${{ steps.latest.outputs.tag }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Get the latest published release tag
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty' 2>/dev/null || true)
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          if [ -z "$LATEST_TAG" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Count commits since last release
        id: check
        run: |
          FORCE="${{ inputs.force || 'false' }}"
          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          HAS_RELEASE="${{ steps.latest.outputs.found }}"

          # Ignore workflow-generated commits so changelog/version housekeeping
          # does not trigger an extra release by itself.
          IGNORE_SUBJECT_RE='^(chore\(release\):|docs\(changelog\):)'

          if [ "$HAS_RELEASE" = "true" ]; then
            COMMIT_COUNT=$(git log --pretty=format:%s "${LATEST_TAG}..HEAD" | grep -Evc "${IGNORE_SUBJECT_RE}" || true)
          else
            COMMIT_COUNT=$(git log --pretty=format:%s HEAD | grep -Evc "${IGNORE_SUBJECT_RE}" || true)
          fi

          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Commits since last release: ${COMMIT_COUNT}"

          if [ "${COMMIT_COUNT}" -gt 0 ] || [ "${FORCE}" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No new commits – skipping release."
          fi

      - name: Configure Git identity
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json / package-lock.json
        if: steps.check.outputs.should_release == 'true'
        id: bump
        run: |
          BUMP_TYPE="${{ inputs.bump || 'patch' }}"
          NEW_TAG=$(npm version "${BUMP_TYPE}" --no-git-tag-version)
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_TAG}"

      - name: Commit release artifacts and push to main
        if: steps.check.outputs.should_release == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.new_tag }} [skip ci]"
          # Retry up to 3 times to handle concurrent pushes to main.
          push_succeeded=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              push_succeeded=true
              break
            fi
            echo "Push attempt ${attempt} failed – rebasing and retrying…"
            git pull --rebase origin main
          done
          if [ "${push_succeeded}" = "false" ]; then
            echo "All git push attempts to main failed; aborting release."
            exit 1
          fi

      - name: Create release tag via GitHub API
        if: steps.check.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.new_tag }}"
          SHA="$(git rev-parse HEAD)"

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' already exists; skipping creation."
            exit 0
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="${SHA}"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build platform-specific Electron installers in parallel.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target.label }}
    needs: check-and-version
    if: needs.check-and-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: mac
            label: macOS
            os: macos-latest
            script: electron:dist:mac
          - id: win
            label: Windows
            os: windows-latest
            script: electron:dist:win
          - id: linux
            label: Linux
            os: ubuntu-latest
            script: electron:dist:linux

    steps:
      - name: Checkout source at release tag
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.check-and-version.outputs.new_tag }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build installer artifacts (macOS)
        if: matrix.target.id == 'mac'
        env:
          # ── macOS code-signing & notarization (optional) ──────────────────
          # Set these repository secrets to enable signing and notarization.
          # If they are not configured, electron-builder silently skips
          # signing and notarization and produces unsigned artifacts instead.
          #
          # CSC_LINK            – base64-encoded .p12 Developer ID certificate
          # CSC_KEY_PASSWORD    – passphrase for the .p12 certificate
          # APPLE_ID            – Apple ID used for notarization
          # APPLE_ID_PASSWORD   – app-specific password for that Apple ID
          # APPLE_TEAM_ID       – 10-character Apple Developer Team ID
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "${CSC_LINK}" ] || unset CSC_LINK
          [ -n "${CSC_KEY_PASSWORD}" ] || unset CSC_KEY_PASSWORD
          [ -n "${APPLE_ID}" ] || unset APPLE_ID
          [ -n "${APPLE_ID_PASSWORD}" ] || unset APPLE_ID_PASSWORD
          [ -n "${APPLE_TEAM_ID}" ] || unset APPLE_TEAM_ID
          npm run ${{ matrix.target.script }}

      - name: Build installer artifacts (Windows)
        if: matrix.target.id == 'win'
        env:
          # ── Windows code-signing (optional) ───────────────────────────────
          # WIN_CSC_LINK         – base64-encoded .p12 certificate for Windows
          # WIN_CSC_KEY_PASSWORD – passphrase for the Windows .p12 certificate
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          [ -n "${WIN_CSC_LINK}" ] || unset WIN_CSC_LINK
          [ -n "${WIN_CSC_KEY_PASSWORD}" ] || unset WIN_CSC_KEY_PASSWORD
          npm run ${{ matrix.target.script }}

      - name: Build installer artifacts (Linux)
        if: matrix.target.id == 'linux'
        run: npm run ${{ matrix.target.script }}

      - name: Upload artifacts (${{ matrix.target.label }})
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.id }}
          path: |
            release/*-mac-*.dmg
            release/*-mac-*.zip
            release/*-win-*-installer.exe
            release/*-win-*-portable.exe
            release/*-linux-*.AppImage
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Create the GitHub release, upload all build artifacts, and update the
  #    changelog only after a successful publish.
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub release
    needs:
      - check-and-version
      - build
    if: needs.check-and-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.check-and-version.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release for tag '$TAG_NAME' already exists; skipping creation."
          else
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "docx-to-md $TAG_NAME" \
              --generate-notes
          fi

          mapfile -t files < <(find release-assets -maxdepth 1 -type f \
            \( -name "*-mac-*.dmg" \
            -o -name "*-mac-*.zip" \
            -o -name "*-win-*-installer.exe" \
            -o -name "*-win-*-portable.exe" \
            -o -name "*-linux-*.AppImage" \))

          if [ "${#files[@]}" -gt 0 ]; then
            gh release upload "$TAG_NAME" "${files[@]}" --repo "$REPO" --clobber
          else
            echo "No binary assets found; release published without installer files."
          fi

      - name: Checkout repository for changelog update
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git identity for changelog commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update CHANGELOG.md
        env:
          PREVIOUS_TAG: ${{ needs.check-and-version.outputs.previous_tag }}
          NEW_TAG: ${{ needs.check-and-version.outputs.new_tag }}
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess
          from datetime import date

          previous_tag = os.environ['PREVIOUS_TAG']
          new_tag      = os.environ['NEW_TAG']
          today        = date.today().isoformat()
          changelog_version = new_tag[1:] if new_tag.startswith('v') else new_tag

          # Collect commits from the previous published release up to (and including)
          # the new tag.  Using an explicit end-ref prevents HEAD noise if main has
          # moved on since the tag was created.
          if previous_tag:
              cmd = ['git', 'log', '--pretty=format:%s', f'{previous_tag}..{new_tag}']
          else:
              cmd = ['git', 'log', '--pretty=format:%s', new_tag]

          raw = subprocess.check_output(cmd, text=True).strip()
          subjects = raw.splitlines() if raw else []

          # Filter out automated release-bump and changelog commits generated by
          # this workflow so they do not appear as user-visible changelog entries.
          # Patterns matched (prefix anchored; trailing [skip ci] is ignored):
          #   chore(release): vX.Y.Z  – version bump from check-and-version job
          #   docs(changelog): update for vX.Y.Z – changelog commit from publish job
          skip_commit_re = re.compile(
              r'^(chore\(release\):\s*v\d+\.\d+\.\d+'
              r'|docs\(changelog\):\s*update for v\d+\.\d+\.\d+)',
              re.IGNORECASE
          )
          subjects = [s for s in subjects if not skip_commit_re.match(s)]

          # Bucket commits by conventional-commit type prefix.
          buckets = {'Added': [], 'Fixed': [], 'Changed': []}
          for s in subjects:
              m = re.match(r'^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert)(\(.+?\))?!?:\s*', s)
              if m:
                  kind = m.group(1)
                  msg  = s[m.end():]
                  if kind == 'feat':
                      buckets['Added'].append(msg)
                  elif kind == 'fix':
                      buckets['Fixed'].append(msg)
                  else:
                      buckets['Changed'].append(msg)
              else:
                  buckets['Changed'].append(s)

          sections = []
          for heading, items in buckets.items():
              if items:
                  body = '\n'.join(f'- {i}' for i in items)
                  sections.append(f'### {heading}\n{body}')

          if not sections:
              sections = ['### Changed\n- No changes recorded']

          new_entry = f"## [{changelog_version}] \u2013 {today}\n\n" + '\n\n'.join(sections) + '\n'

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          # Insert the new entry before the first existing '## ' section.
          insert_pos = content.find('\n## ')
          if insert_pos == -1:
              content = content.rstrip() + '\n\n' + new_entry
          else:
              content = (
                  content[:insert_pos + 1]
                  + new_entry
                  + '\n'
                  + content[insert_pos + 1:]
              )

          with open('CHANGELOG.md', 'w') as f:
              f.write(content)

          print(f"CHANGELOG.md updated with entry for {changelog_version}")
          PYEOF

      - name: Commit and push CHANGELOG.md to main
        run: |
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git commit -m "docs(changelog): update for ${{ needs.check-and-version.outputs.new_tag }} [skip ci]"
          # Retry up to 3 times to handle concurrent pushes to main.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Changelog pushed to main successfully."
              exit 0
            fi
            echo "Push attempt ${attempt} failed – rebasing and retrying…"
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              echo "Rebase failed; will retry from current HEAD on next attempt."
            fi
          done
          echo "Warning: failed to push changelog update after 3 attempts. The release was still published successfully."
