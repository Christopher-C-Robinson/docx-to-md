appId: com.docxtomd.app
productName: docx2md
copyright: Copyright © 2024 docx-to-md contributors

# Electron entry point for the packaged app
extraMetadata:
  main: dist-electron/main.js

directories:
  output: release

# Files to bundle inside the app
files:
  - dist-electron/**/*
  - dist/**/*
  - web/**/*
  - package.json

# Rebuild production native dependencies when packaging
npmRebuild: true

mac:
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  # Hardened Runtime is required for Apple notarization.
  hardenedRuntime: true
  # Entitlements grant the JIT / unsigned-memory permissions Electron needs
  # while still running under the Hardened Runtime sandbox.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Set to false to disable electron-builder's built-in notarization.
  # Notarization can be handled externally via @electron/notarize if needed.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

win:
  # Code-signing certificate supplied via WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD
  # (or CSC_LINK / CSC_KEY_PASSWORD) environment variables, as a base64-encoded
  # .p12 file or a filesystem path. When those variables are not set,
  # electron-builder skips signing automatically.
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: ${productName}-${version}-win-${arch}-installer.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerLanguages:
    - en_US

portable:
  artifactName: ${productName}-${version}-win-${arch}-portable.${ext}

linux:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
